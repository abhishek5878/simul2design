<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V4 — Univest ₹1 trial (current best — for comparison)</title>
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F8FAFC;
    --text-strong: #0F172A;
    --text: #1E293B;
    --text-muted: #64748B;
    --text-faint: #94A3B8;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --accent-green: #10B981;
    --accent-green-dark: #059669;
    --blur: #94A3B8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    background: #CBD5E1;
    color: var(--text);
    font-size: 15px;
    line-height: 1.4;
  }
  .phone {
    width: 375px;
    height: 812px;
    margin: 20px auto;
    background: var(--bg);
    border-radius: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    height: 44px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-strong);
  }
  .status-bar .icons { font-size: 12px; }
  .app-header {
    padding: 8px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-weight: 700;
    font-size: 17px;
    color: var(--text-strong);
  }
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 140px;
  }
  .headline {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-strong);
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .subhead {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .stats-banner {
    background: linear-gradient(135deg, #F0FDF4, #ECFDF5);
    border: 1px solid #BBF7D0;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    text-align: center;
  }
  .stats-big {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent-green-dark);
    margin-bottom: 4px;
  }
  .stats-label {
    font-size: 12px;
    color: var(--text-muted);
  }
  .blurred-trade-card {
    background: var(--surface);
    border: 1.5px solid var(--border-strong);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .blurred-trade-card__header {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .blur-row {
    height: 18px;
    background: linear-gradient(90deg, #CBD5E1 0%, #E2E8F0 50%, #CBD5E1 100%);
    border-radius: 4px;
    margin-bottom: 10px;
    filter: blur(3px);
  }
  .blur-row.wide { width: 60%; }
  .blur-row.narrow { width: 40%; }
  .blur-row.full { width: 100%; height: 22px; }
  .unlock-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(248,250,252,.95) 75%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 20px;
  }
  .lock-icon {
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .unlock-text {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .cta-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px 24px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .cta-outline {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--accent-green-dark);
    border: 1.5px solid var(--accent-green);
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .cta-primary {
    display: block;
    width: 100%;
    background: var(--accent-green);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(16, 185, 129, 0.32);
    cursor: pointer;
  }
  .mismatch-annotation {
    margin-top: 10px;
    font-size: 10px;
    color: #B91C1C;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span class="icons">●●● ▲ 100%</span></div>
    <div class="app-header"><div class="brand">Univest</div></div>
    <div class="scroll-area">
      <h1 class="headline">Unlock your first<br>expert trade.</h1>
      <p class="subhead">Join 50,000+ traders. Activate your trial for ₹1.</p>

      <div class="stats-banner">
        <div class="stats-big">84.7%</div>
        <div class="stats-label">Historical accuracy · past 6 months</div>
      </div>

      <div class="blurred-trade-card">
        <div class="blurred-trade-card__header">Latest closed trade</div>
        <div class="blur-row full"></div>
        <div class="blur-row wide"></div>
        <div class="blur-row narrow"></div>
        <div class="blur-row wide"></div>
        <div class="unlock-overlay">
          <div class="lock-icon">🔒</div>
          <div class="unlock-text">Unlock to reveal</div>
        </div>
      </div>
    </div>
    <div class="cta-footer">
      <button class="cta-outline">Unlock FREE trade</button>
      <button class="cta-primary">₹1 Trial</button>
      <div class="mismatch-annotation">⚠ 33% of V4 users notice the FREE ↔ ₹1 mismatch</div>
    </div>
  </div>
</body>
</html>
